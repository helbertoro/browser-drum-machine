<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caja de Ritmos — Platzi</title>
  <style>
    /* ── Reset ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Tokens ─────────────────────────────────────────────────── */
    :root {
      --bg:          #0f0f0f;
      --surface:     #1a1a1a;
      --surface-2:   #222222;
      --border:      #2e2e2e;
      --accent:      #23e662;
      --accent-dim:  #17a347;
      --text:        #e8e8e8;
      --text-muted:  #6b6b6b;
      --kick-color:  #e05c5c;
      --snare-color: #e09a2e;
      --hihat-color: #5ca0e0;
      --bass-color:  #23e662;
      --radius:      6px;
      --gap:         8px;
    }

    /* ── Base ────────────────────────────────────────────────────── */
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
      gap: 20px;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    #header {
      width: 100%;
      max-width: 860px;
      display: flex;
      align-items: baseline;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }

    #header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--accent);
    }

    #header span {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Transport ───────────────────────────────────────────────── */
    #transport {
      width: 100%;
      max-width: 860px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      flex-wrap: wrap;
    }

    /* ── Grid ────────────────────────────────────────────────────── */
    #grid {
      width: 100%;
      max-width: 860px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }

    /* ── Controls (ADSR) ─────────────────────────────────────────── */
    #controls {
      width: 100%;
      max-width: 860px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    /* ── Persistence ─────────────────────────────────────────────── */
    #persistence {
      width: 100%;
      max-width: 860px;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    /* ── Placeholder text ─────────────────────────────────────────── */
    .placeholder {
      color: var(--text-muted);
      font-size: 11px;
      letter-spacing: 0.06em;
      padding: 8px 0;
    }

    /* ── Sequencer rows ──────────────────────────────────────────── */
    .grid-row {
      display: flex;
      align-items: center;
      gap: var(--gap);
    }

    .grid-label {
      width: 60px;
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      user-select: none;
    }

    .grid-label[data-track="kick"]  { color: var(--kick-color); }
    .grid-label[data-track="snare"] { color: var(--snare-color); }
    .grid-label[data-track="hihat"] { color: var(--hihat-color); }
    .grid-label[data-track="bass"]  { color: var(--bass-color); }

    .grid-cells {
      flex: 1;
      display: flex;
      gap: var(--gap);
    }

    /* Visual beat-group separator: extra gap before step 5 */
    .grid-cells > *:nth-child(5) { margin-left: 8px; }

    /* Step-number header */
    .grid-step-num {
      flex: 1;
      text-align: center;
      color: var(--text-muted);
      font-size: 10px;
      letter-spacing: 0.06em;
      user-select: none;
      padding-bottom: 4px;
    }

    .grid-step-num.beat { color: var(--text); }

    /* Cells */
    .cell {
      flex: 1;
      aspect-ratio: 1;
      min-width: 0;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 80ms ease, border-color 80ms ease, transform 60ms ease;
    }

    .cell:hover:not(.active) {
      border-color: var(--text-muted);
      background: #282828;
    }

    .cell:active { transform: scale(0.88); }

    .grid-row[data-track="kick"]  .cell.active { background: var(--kick-color);  border-color: var(--kick-color); }
    .grid-row[data-track="snare"] .cell.active { background: var(--snare-color); border-color: var(--snare-color); }
    .grid-row[data-track="hihat"] .cell.active { background: var(--hihat-color); border-color: var(--hihat-color); }
    .grid-row[data-track="bass"]  .cell.active { background: var(--bass-color);  border-color: var(--bass-color); }
  </style>
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────────────── -->
  <header id="header">
    <h1>CAJA DE RITMOS</h1>
    <span>Platzi · Web Audio API</span>
  </header>

  <!-- ── Transport ───────────────────────────────────────────────── -->
  <section id="transport" aria-label="Transporte">
    <p class="placeholder">[ transporte: SPEC-04 ]</p>
  </section>

  <!-- ── Sequencer grid ──────────────────────────────────────────── -->
  <section id="grid" aria-label="Secuenciador">
    <p class="placeholder">[ cuadrícula 4×8: SPEC-02 ]</p>
  </section>

  <!-- ── ADSR controls ───────────────────────────────────────────── -->
  <section id="controls" aria-label="Controles ADSR">
    <p class="placeholder">[ ADSR por pista: SPEC-07 ]</p>
  </section>

  <!-- ── Persistence ─────────────────────────────────────────────── -->
  <section id="persistence" aria-label="Guardar / Cargar">
    <p class="placeholder">[ guardar/cargar: SPEC-08 ]</p>
  </section>

  <script>
    'use strict';

    // ── state ──────────────────────────────────────────────────────
    // Fuente única de verdad del patrón. Objeto plano, serializable.
    const state = {
      version: 1,
      bpm: 120,
      isPlaying: false,
      currentStep: 0,
      tracks: {
        kick: {
          steps:   [false, false, false, false, false, false, false, false],
          adsr:    { a: 0.001, d: 0.15, s: 0.0, r: 0.1 },
        },
        snare: {
          steps:   [false, false, false, false, false, false, false, false],
          adsr:    { a: 0.001, d: 0.2,  s: 0.0, r: 0.15 },
        },
        hihat: {
          steps:   [false, false, false, false, false, false, false, false],
          adsr:    { a: 0.001, d: 0.05, s: 0.0, r: 0.03 },
        },
        bass: {
          steps:   [false, false, false, false, false, false, false, false],
          octaves: [1, 1, 1, 1, 1, 1, 1, 1],   // 0=baja 1=media 2=alta
          adsr:    { a: 0.01,  d: 0.2,  s: 0.6, r: 0.2 },
        },
      },
    };

    // ── audio ──────────────────────────────────────────────────────
    // Administra el AudioContext y el gain maestro.
    // El AudioContext se crea de forma perezosa en el primer gesto.
    const audio = {
      ctx:    null,
      master: null,

      ensureContext() {
        if (!this.ctx) {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
          this.master = this.ctx.createGain();
          this.master.gain.value = 0.8;
          this.master.connect(this.ctx.destination);
        }
        if (this.ctx.state === 'suspended') this.ctx.resume();
        return this.ctx;
      },
    };

    // ── scheduler ─────────────────────────────────────────────────
    // Implementado en SPEC-04.
    const scheduler = {};

    // ── playhead ──────────────────────────────────────────────────
    // Implementado en SPEC-05.
    const playhead = {};

    // ── ui ────────────────────────────────────────────────────────
    const ui = {
      TRACKS: ['kick', 'snare', 'hihat', 'bass'],
      LABELS: { kick: 'Kick', snare: 'Snare', hihat: 'Hi-hat', bass: 'Bajo' },

      // Configura el event listener (una sola vez) y renderiza la grilla.
      init() {
        this.renderGrid();
        document.getElementById('grid').addEventListener('click', e => {
          const btn = e.target.closest('.cell');
          if (!btn) return;
          const track = btn.dataset.track;
          const step  = parseInt(btn.dataset.step, 10);
          state.tracks[track].steps[step] = !state.tracks[track].steps[step];
          this.setCell(track, step);
        });
      },

      // Reconstruye toda la grilla desde state. Llamar también tras cargar
      // un patrón desde localStorage (SPEC-08).
      renderGrid() {
        const container = document.getElementById('grid');
        container.innerHTML = '';

        // Fila de números de paso — misma estructura flex que las filas de pista
        const numRow = document.createElement('div');
        numRow.className = 'grid-row';
        numRow.setAttribute('aria-hidden', 'true');

        const spacer = document.createElement('span');
        spacer.className = 'grid-label';
        numRow.appendChild(spacer);

        const nums = document.createElement('div');
        nums.className = 'grid-cells';
        for (let i = 0; i < 8; i++) {
          const n = document.createElement('span');
          n.className = 'grid-step-num' + (i % 4 === 0 ? ' beat' : '');
          n.textContent = i + 1;
          nums.appendChild(n);
        }
        numRow.appendChild(nums);
        container.appendChild(numRow);

        // Filas de pista
        this.TRACKS.forEach(track => {
          const row = document.createElement('div');
          row.className = 'grid-row';
          row.dataset.track = track;

          const label = document.createElement('span');
          label.className = 'grid-label';
          label.dataset.track = track;
          label.textContent = this.LABELS[track];
          row.appendChild(label);

          const cells = document.createElement('div');
          cells.className = 'grid-cells';

          for (let i = 0; i < 8; i++) {
            const isActive = state.tracks[track].steps[i];
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'cell' + (isActive ? ' active' : '');
            btn.dataset.track = track;
            btn.dataset.step  = i;
            btn.setAttribute('aria-pressed', String(isActive));
            btn.setAttribute('aria-label', `${this.LABELS[track]} paso ${i + 1}`);
            cells.appendChild(btn);
          }

          row.appendChild(cells);
          container.appendChild(row);
        });
      },

      // Sincroniza el estado visual de una celda con state.
      // Usado por el toggle de clic y por SPEC-08 tras cargar.
      setCell(track, step) {
        const btn = document.querySelector(
          `.cell[data-track="${track}"][data-step="${step}"]`
        );
        if (!btn) return;
        const active = state.tracks[track].steps[step];
        btn.classList.toggle('active', active);
        btn.setAttribute('aria-pressed', String(active));
      },
    };

    // ── storage ───────────────────────────────────────────────────
    // Implementado en SPEC-08.
    const storage = {};

    // ── Init ──────────────────────────────────────────────────────
    ui.init();
  </script>

</body>
</html>
